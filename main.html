<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAIR CODE | AMON-MD-MINI WhatsApp Bot Connection</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;600&family=Poppins:wght@300;400;500;600&display=swap');
    
    :root {
      --primary: #b77eff;
      --primary-dark: #9a4dff;
      --secondary: #c084fc;
      --accent: #e9b0ff;
      --purple-glow: #b77eff;
      --dark: #0a0a14;
      --darker: #05050a;
      --card-bg: rgba(20, 15, 35, 0.75);
      --glass: rgba(25, 20, 45, 0.65);
      --glass-border: rgba(160, 120, 255, 0.25);
      --gradient: linear-gradient(135deg, #9b4dff 0%, #c084fc 100%);
      --gradient-secondary: linear-gradient(135deg, #c084fc 0%, #e9b0ff 100%);
      --shadow-purple: 0 0 15px rgba(155, 77, 255, 0.4);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #110b1f 0%, #03010a 100%);
      font-family: 'Poppins', sans-serif;
      color: #f0eaff;
      overflow: hidden;
      position: relative;
    }
    
    /* Dark theme with purple particles background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 15% 25%, rgba(128, 60, 255, 0.2) 0%, transparent 55%),
        radial-gradient(circle at 85% 70%, rgba(192, 132, 252, 0.15) 0%, transparent 60%),
        repeating-linear-gradient(45deg, rgba(128, 90, 200, 0.03) 0px, rgba(128, 90, 200, 0.03) 2px, transparent 2px, transparent 8px);
      z-index: -2;
    }
    
    /* Animated grid overlay */
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(156, 77, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(156, 77, 255, 0.08) 1px, transparent 1px);
      background-size: 35px 35px;
      transform: skewY(-2deg);
      animation: gridMove 20s linear infinite;
      z-index: -1;
    }
    
    @keyframes gridMove {
      0% { transform: translateY(0) skewY(-2deg); }
      100% { transform: translateY(35px) skewY(-2deg); }
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }
    
    .main {
      position: relative;
      width: 100%;
      max-width: 440px;
    }
    
    .box {
      width: 100%;
      padding: 35px 30px;
      position: relative;
      text-align: center;
      background: var(--glass);
      border-radius: 32px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 25px 45px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 30px rgba(128, 60, 255, 0.2);
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s ease;
      z-index: 1;
    }
    
    .box::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, #9b4dff, #c084fc, #e9b0ff);
      border-radius: 34px;
      z-index: -2;
      opacity: 0.2;
      transition: opacity 0.5s;
    }
    
    .box:hover::after {
      opacity: 0.5;
    }
    
    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 25px rgba(155, 77, 255, 0.5);
    }
    
    .logo {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;

    }
    
    .logo-image {

      overflow: hidden;

    }
    
    .logo-image img {

    .logo-text {

    @keyframes pulse-purple {

    .nav-item svg {

    .contact-details {

    .contact-line {

    .contact-line i {

    .contact-line span {

    .footer {
      position: absolute;
      bottom: 22px;
      left: 0;
      width: 100%;
      text-align: center;

      font-size: 12px;

    .footer a {
      color: #cfaaff;
      text-decoration: none;
    }
    
    @media (max-width: 500px) {
      .input-container {
        flex-direction: column;
        gap: 10px;
      }
      
      .input-container input {
        border-radius: 12px;
        border-right: none;
        border-bottom: 1px solid rgba(156, 77, 255, 0.5);
      }
      
      .input-container button {
        padding: 12px;
        border-radius: 12px;
      }
      
      .box {
        padding: 25px 18px;
      }
      
      .logo-text {
        font-size: 20px;
      }
      
      .nav-menu {
        width: 280px;
      }
    }
    
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }
    
    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(192, 132, 252, 0.5), rgba(128, 60, 200, 0.2));
      border-radius: 50%;
      animation: floatUp 18s infinite linear;
      filter: blur(1px);
    }
    
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      15% { opacity: 0.6; }
      85% { opacity: 0.5; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
    
    .alert-message {
      color: #f0b9ff;
      font-weight: 500;
      background: rgba(156, 77, 255, 0.2);
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(192, 132, 252, 0.5);
      backdrop-filter: blur(4px);
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");
    let box = document.getElementById("box");
    let waitingMessage = document.getElementById("waiting-message");
    let menuToggle = document.getElementById("menuToggle");
    let navMenu = document.getElementById("navMenu");

    menuToggle.addEventListener('click', function() {
      this.classList.toggle('active');
      navMenu.classList.toggle('active');
    });

    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 45;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 12 + 3;
        const purpleShades = [
          'rgba(156, 77, 255, 0.4)', 
          'rgba(192, 132, 252, 0.35)', 
          'rgba(128, 60, 200, 0.45)'
        ];
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.background = purpleShades[Math.floor(Math.random() * purpleShades.length)];
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDuration = `${Math.random() * 18 + 12}s`;
        particle.style.animationDelay = `${Math.random() * 8}s`;
        
        particlesContainer.appendChild(particle);
      }
    }
    
    createParticles();

    async function Copy() {
      let textElem = document.getElementById("copy-value");
      if (!textElem) return;
      let text = textElem.innerText;
      let codeDisplay = document.getElementById("code-display");
      if (!codeDisplay) return;
      await navigator.clipboard.writeText(text);
      
      const originalHTML = codeDisplay.innerHTML;
      codeDisplay.innerHTML = '<i class="fas fa-check" style="color:#c47eff; margin-right:8px;"></i> COPIED!';
      codeDisplay.style.background = 'rgba(100, 50, 180, 0.5)';
      codeDisplay.style.border = '1px solid #c084fc';
      
      setTimeout(() => {
        codeDisplay.innerHTML = originalHTML;
        codeDisplay.style.background = 'rgba(10, 5, 25, 0.7)';
        codeDisplay.style.border = '1px solid rgba(192, 132, 252, 0.5)';
      }, 2000);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<div class="alert-message"><i class="fas fa-exclamation-circle"></i> Enter your WhatsApp number with country code.</div>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<div class="alert-message"><i class="fas fa-times"></i> Invalid number format</div>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "";
        let bbc = "";
        const cc = bc.split('');
        cc.map(a => {
          bbc += a;
          if (bbc.length == 3) {
            bb += " " + a;
          } else if (bbc.length == 8) {
            bb += " " + a;
          } else {
            bb += a;
          }
        });
        c.type = "text";
        c.value = "+" + bb;
        c.style.color = "#eeddff";
        waitingMessage.style.display = "block";
        a.innerHTML = '';
        
        try {
          let { data } = await axios(`/code?number=${bc}`);
          let code = data.code || "Service Unavailable";
          waitingMessage.style.display = "none";
          
          a.innerHTML = `
            <div class="code-display pulse" id="code-display" onclick="Copy()">
              <i class="fas fa-copy" style="color:#c49eff;"></i>
              <span class="code-text">CODE:</span>
              <span class="code-value" id="copy-value">${code}</span>
            </div>
          `;
          window.Copy = Copy;
        } catch (error) {
          waitingMessage.style.display = "none";
          a.innerHTML = '<div class="alert-message"><i class="fas fa-exclamation-triangle"></i> Service Unavailable</div>';
        }
      }
    });
    window.Copy = Copy;
    
    // Prevent closing of help details accidentally when clicking inside contact details
    document.getElementById('helpItem')?.addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>
</html>
